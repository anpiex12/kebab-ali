name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # Ebitengine needs OpenGL, X11 and ALSA development headers to compile on
      # Linux (it uses cgo there). Xvfb + the Mesa software renderer give the
      # test binaries a virtual display, since importing Ebitengine initialises
      # GLFW at package load and would otherwise panic on the headless runner.
      - name: Install Ebitengine build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libgl1-mesa-dri xorg-dev libasound2-dev \
            libxi-dev libxcursor-dev libxinerama-dev libxrandr-dev libxxf86vm-dev \
            xvfb pkg-config

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...

      - name: Test (race + coverage)
        run: xvfb-run -a go test ./... -race -cover

  # Prove the game compiles natively on every target OS — a stronger check than a
  # single-host cross-compile, since Ebitengine links against each platform's
  # native graphics/audio stack.
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install Ebitengine build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev xorg-dev libasound2-dev \
            libxi-dev libxcursor-dev libxinerama-dev libxrandr-dev libxxf86vm-dev \
            pkg-config

      - name: Build
        run: go build -v ./...
